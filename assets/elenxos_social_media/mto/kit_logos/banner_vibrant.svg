<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="400" fill="#8B0000"/>
    
    <!-- Logo a la izquierda -->
    <g transform="translate(100, 100) scale(5)">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Hexágono -->
    <polygon points="20,2 35.6,11 35.6,29 20,38 4.4,29 4.4,11" stroke="#FFFFFF" stroke-width="1.2" stroke-linejoin="round" opacity="0.4"/>
    
    <!-- Triángulo inmerso -->
    <polygon points="4.4,11 35.6,11 20,38" stroke="#FFFFFF" stroke-width="1" stroke-linejoin="round" opacity="0.6"/>
    
    <!-- Topología de red -->
    <path d="M20,20 L20,2 M20,20 L35.6,29 M20,20 L4.4,29" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Nodos -->
    <circle cx="20" cy="20" r="3.5" fill="#FFFFFF" opacity="1"/>
    <circle cx="20" cy="11" r="1.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="27.8" cy="24.5" r="1.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="12.2" cy="24.5" r="1.5" fill="#FFFFFF" opacity="0.9"/>
</svg>
    </g>
    
    <!-- Texto -->
    <text x="350" y="200" font-family="Playfair Display, serif" font-size="80" fill="#FFFFFF" font-weight="bold">ELENXOS</text>
    <text x="350" y="260" font-family="Inter, sans-serif" font-size="30" fill="#FFFFFF" letter-spacing="4">AGORA · INVESTIGACIÓN COOPERATIVA</text>
</svg>