    <!-- Triángulo inmerso: La síntesis disciplinar -->
    <polygon points="4.4,11 35.6,11 20,38" stroke="#3A3F41" stroke-width="1" stroke-linejoin="round" opacity="0.6" fill="none"/>
    
    <!-- Topología de red: Sistemas complejos -->
    <path d="M20,20 L20,2 M20,20 L35.6,29 M20,20 L4.4,29" stroke="#3A3F41" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Nodos: Convergencia epistémica -->
    <circle cx="20" cy="20" r="3.5" fill="#3A3F41" opacity="1"/>
    <circle cx="20" cy="11" r="1.5" fill="#3A3F41" opacity="0.9"/>
    <circle cx="27.8" cy="24.5" r="1.5" fill="#3A3F41" opacity="0.9"/>
    <circle cx="12.2" cy="24.5" r="1.5" fill="#3A3F41" opacity="0.9"/>

