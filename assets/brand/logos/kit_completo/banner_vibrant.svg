<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Fondo -->
    <rect width="1200" height="400" fill="#8B0000"/>
    
    <!-- Patrón de fondo sutil (Opcional: Rejilla lógica) -->
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.05"/>
        </pattern>
    </defs>
    <rect width="1200" height="400" fill="url(#grid)" />

    <!-- Logo: Ahora incrustado directamente como grupo para máxima compatibilidad -->
    <g transform="translate(150, 100) scale(5)">
        
    <!-- Hexágono: El marco analítico -->
    <polygon points="20,2 35.6,11 35.6,29 20,38 4.4,29 4.4,11" stroke="#FFFFFF" stroke-width="1.2" stroke-linejoin="round" opacity="0.4" fill="none"/>
    
    <!-- Triángulo inmerso: La síntesis disciplinar -->
    <polygon points="4.4,11 35.6,11 20,38" stroke="#FFFFFF" stroke-width="1" stroke-linejoin="round" opacity="0.6" fill="none"/>
    
    <!-- Topología de red: Sistemas complejos -->
    <path d="M20,20 L20,2 M20,20 L35.6,29 M20,20 L4.4,29" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Nodos: Convergencia epistémica -->
    <circle cx="20" cy="20" r="3.5" fill="#FFFFFF" opacity="1"/>
    <circle cx="20" cy="11" r="1.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="27.8" cy="24.5" r="1.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="12.2" cy="24.5" r="1.5" fill="#FFFFFF" opacity="0.9"/>

    </g>
    
    <!-- Composición de Texto -->
    <g transform="translate(420, 185)">
        <text font-family="Playfair Display, serif" font-size="100" fill="#FFFFFF" font-weight="bold" letter-spacing="2">ELENXOS</text>
        <text y="70" font-family="Inter, sans-serif" font-size="28" fill="#FFFFFF" letter-spacing="6" opacity="0.9">EL RIGOR DEL INSTINTO</text>
    </g>
    
    <!-- Elemento decorativo: Línea de rigor -->
    <rect x="420" y="210" width="400" height="1" fill="#FFFFFF" opacity="0.3"/>
</svg>